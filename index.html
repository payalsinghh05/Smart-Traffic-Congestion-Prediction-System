<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrafficIQ — Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", sans-serif; }

    body {
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Header — matches dashboard header exactly ── */
    .top-header {
      height: 70px;
      background: #1e293b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    .logo { display:flex; align-items:center; gap:15px; }
    .logo i { font-size:26px; color:#3b82f6; }
    .logo h1 { font-size:20px; letter-spacing:1px; }
    .logo h1 span { font-size:12px; opacity:0.7; }
    .logo p { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; opacity:0.6; }

    .header-right {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: rgba(255,255,255,0.7);
    }
    .status-dot {
      width: 9px; height: 9px;
      background: #10b981; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0px rgba(16,185,129,0.7); }
      100% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    }

    /* ── Main layout ── */
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* ── Card — matches dashboard .card style ── */
    .login-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .card-icon {
      width: 52px; height: 52px;
      background: #eff6ff;
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 12px;
      border: 1px solid #dbeafe;
    }

    .card-header h2 {
      font-size: 22px; font-weight: 700;
      color: #1e293b; margin-bottom: 4px;
    }

    .card-header p {
      font-size: 13px; color: #64748b;
    }

    /* ── Tabs ── */
    .tab-row {
      display: flex;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }

    .tab-btn {
      flex: 1; padding: 9px;
      border: none; background: transparent;
      color: #64748b;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border-radius: 7px;
      transition: all 0.25s;
    }

    .tab-btn.active {
      background: white;
      color: #1976d2;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ── Inputs — matches dashboard inputs ── */
    .input-group { margin-bottom: 14px; }

    .input-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: #64748b; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .input-wrap { position: relative; }

    .input-wrap i.ico {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8; font-size: 13px;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 11px 12px 11px 36px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px; color: #1e293b;
      outline: none; transition: 0.25s;
      background: white;
    }

    .input-wrap input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .input-wrap input::placeholder { color: #cbd5e1; }

    .eye-btn {
      position: absolute; right: 11px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8; cursor: pointer; font-size: 13px;
    }
    .eye-btn:hover { color: #64748b; }

    /* Strength bar */
    .strength-bar { height: 3px; border-radius: 2px; background: #e2e8f0; margin-top: 6px; overflow: hidden; display: none; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.4s; width: 0%; }
    .strength-label { font-size: 10px; color: #94a3b8; margin-top: 3px; display: none; }

    /* ── Buttons — matches dashboard primary-btn ── */
    .login-btn {
      width: 100%;
      padding: 13px;
      background: #3b82f6;
      color: white;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      margin-top: 4px;
    }
    .login-btn:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
    .login-btn:disabled { background: #93c5fd; cursor: not-allowed; transform: none; box-shadow: none; }

    .divider {
      text-align: center; color: #94a3b8;
      font-size: 12px; margin: 16px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute;
      top: 50%; width: 42%; height: 1px;
      background: #e2e8f0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .guest-btn {
      width: 100%; padding: 11px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px; color: #64748b;
      font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .guest-btn:hover { background: #f1f5f9; border-color: #cbd5e1; color: #1e293b; }

    .forgot-link {
      display: block; text-align: right;
      font-size: 12px; color: #64748b;
      text-decoration: none; margin-top: 8px;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: #3b82f6; }

    /* ── Message ── */
    .msg-box {
      min-height: 18px;
      text-align: center; font-size: 13px;
      border-radius: 8px; margin-top: 12px;
      padding: 0; transition: all 0.25s;
    }
    .msg-box.error   { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; padding: 8px; }
    .msg-box.success { color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 8px; }

    /* ── Feature pills below card ── */
    .feature-row {
      display: flex; justify-content: center;
      gap: 16px; margin-top: 20px;
      flex-wrap: wrap;
    }
    .feature-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #64748b;
    }
    .feature-pill i { color: #10b981; font-size: 10px; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header — same style as dashboard -->
<header class="top-header">
  <div class="logo">
    <i class="fa-solid fa-satellite-dish"></i>
    <div>
      <h1>TrafficIQ <span>v2.0</span></h1>
      <p>Predictive Analytics Dashboard</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    Smart City Navigation
  </div>
</header>

<!-- Login body -->
<div class="page-body">
  <div class="login-wrapper">

    <div class="login-card">

      <div class="card-header">
        <div class="card-icon">🛰️</div>
        <h2>Welcome Back</h2>
        <p>Login or create an account to continue</p>
      </div>

      <!-- Tabs -->
      <div class="tab-row">
        <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">Login</button>
        <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Username -->
      <div class="input-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user ico"></i>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="off"/>
        </div>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock ico"></i>
          <input type="password" id="password" placeholder="Enter your password" oninput="checkStrength(this.value)"/>
          <i class="fa-solid fa-eye eye-btn" onclick="togglePwd()"></i>
        </div>
        <div class="strength-bar" id="strengthBar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <!-- Confirm password (register only) -->
      <div class="input-group" id="confirmGroup" style="display:none;">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock ico"></i>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password"/>
        </div>
      </div>

      <!-- Phone number (register only) -->
      <div class="input-group" id="phoneGroup" style="display:none;">
        <label>Phone Number <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
        <div class="input-wrap">
          <i class="fa-solid fa-phone ico"></i>
          <input type="tel" id="phoneNumber" placeholder="10-digit mobile number" maxlength="10"/>
        </div>
        <div style="font-size:10px;color:#94a3b8;margin-top:3px;">Used to recover your account if you forget your password</div>
      </div>

      <button class="login-btn" id="mainBtn" onclick="handleMain()">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
        <span id="btnText">Login</span>
      </button>

      <a href="forgot_password.html" class="forgot-link" id="forgotLink">Forgot password?</a>

      <div class="divider">or</div>
      <button class="guest-btn" onclick="continueAsGuest()">Continue as Guest</button>

      <div class="msg-box" id="msgBox"></div>
    </div>

    <div class="feature-row">
      <div class="feature-pill"><i class="fa-solid fa-check"></i> AI Predictions</div>
      <div class="feature-pill"><i class="fa-solid fa-check"></i> Live Routes</div>
      <div class="feature-pill"><i class="fa-solid fa-check"></i> Analytics</div>
      <div class="feature-pill"><i class="fa-solid fa-check"></i> Route History</div>
      <div class="feature-pill"><i class="fa-solid fa-check"></i> Phone Recovery</div>
    </div>

  </div>
</div>

<script>
  const BASE_URL = "http://127.0.0.1:5000";
  let mode = 'login';

  function switchTab(tab) {
    mode = tab;
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('btnText').textContent = tab === 'login' ? 'Login' : 'Register';
    document.getElementById('confirmGroup').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('forgotLink').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('strengthBar').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('strengthLabel').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('phoneGroup').style.display = tab === 'register' ? 'block' : 'none';
    clearMsg();
  }

  function togglePwd() {
    const i = document.getElementById('password');
    i.type = i.type === 'password' ? 'text' : 'password';
  }

  function checkStrength(val) {
    if (mode !== 'register') return;
    let s = 0;
    if (val.length >= 6) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    const lvs = [
      { w:'25%', c:'#ef4444', t:'Weak' },
      { w:'50%', c:'#f59e0b', t:'Fair' },
      { w:'75%', c:'#3b82f6', t:'Good' },
      { w:'100%',c:'#10b981', t:'Strong' }
    ];
    const lv = lvs[Math.max(0, s - 1)] || lvs[0];
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    fill.style.width = val.length ? lv.w : '0%';
    fill.style.background = lv.c;
    label.textContent = val.length ? `Password strength: ${lv.t}` : '';
    label.style.color = lv.c;
  }

  function showMsg(text, type) {
    const el = document.getElementById('msgBox');
    el.textContent = text;
    el.className = 'msg-box ' + type;
  }
  function clearMsg() {
    const el = document.getElementById('msgBox');
    el.textContent = ''; el.className = 'msg-box';
  }

  function setLoading(text) {
    const btn = document.getElementById('mainBtn');
    btn.disabled = true;
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;"></span> ${text}`;
  }
  function resetBtn(text) {
    const btn = document.getElementById('mainBtn');
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-arrow-right-to-bracket"></i> ${text}`;
    document.getElementById('btnText') && (document.getElementById('btnText').textContent = text);
  }

  async function handleMain() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    if (!user || !pass) return showMsg('Please fill in all fields.', 'error');
    if (mode === 'login') await doLogin(user, pass);
    else await doRegister(user, pass);
  }

  async function doLogin(user, pass) {
    setLoading('Logging in...');
    try {
      const res = await fetch(`${BASE_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('user_id', data.user_id);
        localStorage.setItem('username', user);
        showMsg('✓ Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } else {
        showMsg(data.message || 'Login failed.', 'error');
        resetBtn('Login');
      }
    } catch {
      showMsg('⚠ Backend offline — make sure app.py is running!', 'error');
      resetBtn('Login');
    }
  }

  async function doRegister(user, pass) {
    const confirm = document.getElementById('confirmPassword').value.trim();
    if (pass !== confirm) return showMsg('Passwords do not match.', 'error');
    if (pass.length < 4) return showMsg('Password must be at least 4 characters.', 'error');
    setLoading('Registering...');
    try {
      const res = await fetch(`${BASE_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass, phone: document.getElementById('phoneNumber').value.trim() })
      });
      const data = await res.json();
      showMsg(data.message, res.ok ? 'success' : 'error');
      if (res.ok) {
        setTimeout(() => {
          switchTab('login');
          document.getElementById('username').value = user;
        }, 1200);
      }
    } catch {
      showMsg('⚠ Backend offline — make sure app.py is running!', 'error');
    }
    resetBtn('Register');
  }

  function continueAsGuest() {
    localStorage.removeItem('user_id');
    localStorage.setItem('username', 'Guest');
    window.location.href = 'dashboard.html';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleMain(); });
</script>
</body>
</html>
